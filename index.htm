<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medex Healthcare</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="intro">💜 MEDEX 💜</div>

<div id="login" class="container">
  <div class="card">
    <h2>Secure Login</h2>
    <input type="password" id="pass" placeholder="Enter Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<div id="app" class="hidden">

<nav>
  <button onclick="showSection('patients')">Patients</button>
  <button onclick="showSection('doctors')">Doctors</button>
  <button onclick="showSection('appointments')">Appointments</button>
  <button onclick="showSection('admin')">Admin</button>
</nav>

<section id="patients" class="card hidden">
<h2>Patients</h2>
<input id="pname" placeholder="Name">
<input id="page" placeholder="Age">
<button onclick="addPatient()">Add</button>
<div id="plist"></div>
</section>

<section id="doctors" class="card hidden">
<h2>Doctors</h2>
<input id="dname" placeholder="Doctor Name">
<button onclick="addDoctor()">Add</button>
<div id="dlist"></div>
</section>

<section id="appointments" class="card hidden">
<h2>Appointments</h2>
<input id="apname" placeholder="Patient Name">
<input id="docname" placeholder="Doctor">
<button onclick="addAppointment()">Book</button>
<div id="alist"></div>
</section>

<section id="admin" class="card hidden">
<h2>Dashboard</h2>
<div id="stats"></div>

<h3>Search Patient</h3>
<input id="search" placeholder="Search patient">
<button onclick="searchPatient()">Search</button>
<div id="result"></div>

<h3>Prescription</h3>
<input id="pres" placeholder="Write prescription">
<button onclick="savePrescription()">Save</button>
</section>

<footer>© Medex | By Atulya</footer>

</div>

<script src="script.js"></script>
</body>
</html>
