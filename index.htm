<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medex Final Boss</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>
<body>

<div id="intro">💜 MEDEX FINAL 💜</div>

<div id="login" class="center">
  <div class="glass">
    <h2>Secure Access</h2>
    <input type="password" id="pass" placeholder="Password">
    <button onclick="login()">Enter</button>
  </div>
</div>

<div id="app" class="hidden">

<div class="sidebar">
  <h2>Medex</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('patients')">Patients</button>
  <button onclick="show('appointments')">Appointments</button>
  <button onclick="show('bot')">AI Bot</button>
</div>

<div class="main">

<section id="dashboard" class="glass hidden">
<h2>Analytics</h2>
<canvas id="chart"></canvas>
</section>

<section id="patients" class="glass hidden">
<h2>Patients</h2>
<input id="pname" placeholder="Name">
<input id="page" placeholder="Age">
<button onclick="addPatient()">Add Patient</button>
<div id="plist"></div>
</section>

<section id="appointments" class="glass hidden">
<h2>Appointments</h2>
<input id="apname" placeholder="Patient">
<input id="docname" placeholder="Doctor">
<button onclick="addAppointment()">Book</button>
<div id="alist"></div>
</section>

<section id="bot" class="glass hidden">
<h2>Medex AI Assistant</h2>
<div id="chat"></div>
<input id="q" placeholder="Ask something...">
<button onclick="askBot()">Send</button>
</section>

</div>

<footer>© Medex Final | By Atulya</footer>

</div>

<script src="script.js"></script>
</body>
</html>
