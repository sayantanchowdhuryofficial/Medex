<!DOCTYPE html>
<div id="login" class="center">
  <div class="glass login-card">
    <h1>Medex</h1>
    <input type="password" id="pass" placeholder="Enter Secure Key">
    <button onclick="login()">Unlock</button>
  </div>
</div>

<div id="app" class="hidden">

<div class="sidebar">
  <h2>Medex</h2>
  <button onclick="show('dashboard')">Dashboard</button>
  <button onclick="show('patients')">Patients</button>
  <button onclick="show('bot')">AI Bot</button>
</div>

<div class="main">

<header>
  <h2 id="title">Dashboard</h2>
  <div class="menu">
    ⋮
    <div class="dropdown">
      <p onclick="clearData()">Clear Data</p>
    </div>
  </div>
</header>

<section id="dashboard" class="glass hidden">
<div class="cards">
  <div class="card" id="pcount"></div>
  <div class="card" id="acount"></div>
</div>
<canvas id="chart"></canvas>
</section>

<section id="patients" class="glass hidden">
<input id="pname" placeholder="Name">
<input id="page" placeholder="Age">
<button onclick="addPatient()">Add</button>
<div id="plist"></div>
</section>

<section id="bot" class="glass hidden">
<div id="chat"></div>
<input id="q" placeholder="Ask Medex AI">
<button onclick="askBot()">Send</button>
</section>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
